<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Craftyhedge WebGPU foliage prototype with procedural hills and wind-blown hedge growth."
    />
    <title>Craftyhedge</title>
  </head>
  <body class="bg-[#10170f] text-white antialiased">
    <canvas id="scene" class="fixed inset-0 h-full w-full"></canvas>

    <main class="pointer-events-none fixed inset-0">
      <section class="flex min-h-screen items-start justify-between gap-4 p-4 sm:p-6">
        <div class="scene-panel pointer-events-auto w-full max-w-xs rounded-md border border-white/15 bg-[#132015]/80 p-4 shadow-2xl shadow-black/25 backdrop-blur-md">
          <div class="flex items-center justify-between gap-3">
            <h1 class="text-lg font-black tracking-wide text-[#ecffd6]">Craftyhedge</h1>
            <span class="h-2.5 w-2.5 rounded-full bg-[#bef264] shadow-[0_0_18px_rgba(190,242,100,0.9)]"></span>
          </div>
          <p class="mt-2 text-xs font-semibold uppercase tracking-[0.18em] text-[#a7f3d0]" data-scene-stats>
            Preparing canopy
          </p>
          <div class="mt-4 h-1.5 overflow-hidden rounded-full bg-white/10">
            <div class="scene-meter h-full w-full rounded-full bg-[#bef264]"></div>
          </div>
        </div>

        <p
          class="scene-panel pointer-events-auto max-w-xs rounded-md border border-amber-200/30 bg-[#24170d]/85 p-4 text-sm leading-6 text-amber-50 shadow-2xl shadow-black/25 backdrop-blur-md"
          data-webgpu-fallback
          hidden
        ></p>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
