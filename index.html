<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Craftyhedge WebGPU foliage prototype with procedural hills and wind-blown hedge growth."
    />
    <title>Crafty Hedge Bloom</title>
  </head>
  <body class="bg-[#10170f] text-white antialiased">
    <div class="scene-stage" data-scene-stage>
      <canvas id="scene" class="absolute inset-0 h-full w-full scene-canvas" data-scene-canvas></canvas>

      <div class="scene-loader" data-scene-loader>
        <div class="scene-loader__spinner" aria-hidden="true"></div>
        <p class="scene-loader__message" data-scene-loader-message>Growing the hedge…</p>
      </div>

      <main class="pointer-events-none absolute inset-0">
        <section class="flex h-full items-start justify-end gap-4 p-4 sm:p-6">
        <p
          class="pointer-events-auto max-w-xs rounded-md border border-amber-200/30 bg-[#24170d]/85 p-4 text-sm leading-6 text-amber-50 shadow-2xl shadow-black/25 backdrop-blur-md"
          data-webgpu-fallback
          hidden
        ></p>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
